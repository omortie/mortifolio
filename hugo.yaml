  # Hero section
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Morteza."
    subtitle: "Senior Software Engineer — C++ | Qt | Flutter | Python"
    content: "Experienced software engineer with over six years building industrial desktop applications, automation systems, and MVPs. Specializing in Qt/C++, with a strong breadth across Python, Flutter, Node.js, and React. Interested in learning Rust."
    image: /images/hero.png
